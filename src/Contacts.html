<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartFits | Contact</title>


<link rel="stylesheet" 
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">


<link rel="stylesheet" href="styles/navbar.css">
<link rel="stylesheet" href="styles/footer.css">


<style>


body{

margin:0;
font-family:'Montserrat',sans-serif;
background:#f7f7f7;

}


/* CONTACT */

.contact-section{

min-height:650px;

display:flex;

justify-content:center;

align-items:center;

padding:40px;

}



.contact-card{

background:white;

width:450px;

padding:45px;

border-radius:20px;

box-shadow:
0 15px 35px rgba(0,0,0,.12);

animation:fade .6s ease;


}



@keyframes fade{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0);

}


}




.contact-card h1{

text-align:center;

font-size:36px;

color:#222;

margin-bottom:10px;

}



.contact-card>p{

text-align:center;

color:#777;

margin-bottom:30px;

}




form{

display:flex;

flex-direction:column;

gap:12px;

}



label{

font-size:14px;

font-weight:600;

color:#333;

}




input,
textarea{


padding:14px;

border-radius:12px;

border:1px solid #ddd;

font-size:15px;

font-family:inherit;

transition:.3s;

}



input:focus,
textarea:focus{

outline:none;

border-color:#0088a9;

box-shadow:
0 0 8px rgba(0,136,169,.2);

}




textarea{

resize:none;

}




.send-btn{


margin-top:15px;

background:#05090a;

color:white;

border:none;

padding:14px;

border-radius:30px;

cursor:pointer;

font-size:16px;

transition:.3s;


}




.send-btn:hover{

background:#060f11;

transform:translateY(-3px);

}




#response{


display:none;

text-align:center;

padding:15px;

border-radius:10px;

margin-top:15px;

font-size:14px;

}




.success{

display:block!important;

background:#e8f7ee;

color:#198754;

}



.error{

display:block!important;

background:#fdecec;

color:#dc3545;

}



</style>



</head>



<body>


<header class="header">


    <div class="brand">


        <span>
            SmartFits
        </span>

    </div>



    <nav>

        <ul class="nav_links">

            <li>
                <a href="../index.html">
                    Home
                </a>
            </li>


            <li>
                <a href="Products.html">
                    Products
                </a>
            </li>


            <li>
                <a href="AboutUs.html">
                    About
                </a>
            </li>


            <li>
                <a href="Contacts.html">
                    Contact
                </a>
            </li>

        </ul>


    </nav>



    <div class="header-buttons">

        <a href="PatientRegistration.html">
            <button class="btn-outline">
                Register
            </button>
        </a>


        <a href="Login.html">

            <button class="btn-primary">
                Login
            </button>

        </a>


    </div>
    <div class="cart">

<i class="fa fa-shopping-bag"></i>

<span id="cartCount">
0
</span>

</div>


</header>




<section class="contact-section">


<div class="contact-card">


<h1>
Contact Us
</h1>


<p>
We are ready to answer your questions.
</p>



<form id="contactForm">



<label for="name">
Full Name
</label>


<input
id="name"
type="text"
placeholder="Enter your name"
required>




<label for="phone">
Phone Number
</label>


<input
id="phone"
type="text"
placeholder="9 digit phone number"
required>




<label for="email">
Email
</label>


<input
id="email"
type="email"
placeholder="example@gmail.com"
required>




<label for="message">
Message
</label>


<textarea
id="message"
rows="5"
placeholder="Write your message..."
required>
</textarea>




<button class="send-btn"
type="submit">

Send Message

</button>



<div id="response"></div>



</form>



</div>


</section>







<footer class="footer-distributed">


<div class="footer-left">


<h3>
Smart<span>Fits</span>
</h3>


<p>
Premium fashion store.
</p>


<p class="footer-company-name">

SmartFits © 2026

</p>


</div>






<div class="footer-center">


<div>

<i class="fa fa-envelope"></i>

<p>
smartfits@gmail.com
</p>

</div>



<div>

<i class="fa fa-phone"></i>

<p>
+51 900 000 000
</p>

</div>


</div>





<div class="footer-right">


<h3>
Follow us
</h3>



<div class="footer-icons">


<a>
<i class="fa fa-facebook"></i>
</a>


<a>
<i class="fa fa-instagram"></i>
</a>


<a>
<i class="fa fa-twitter"></i>
</a>



</div>



</div>




</footer>








<script>


document
.getElementById("contactForm")
.addEventListener("submit",function(e){


e.preventDefault();



const name =
document.getElementById("name").value.trim();


const phone =
document.getElementById("phone").value.trim();


const email =
document.getElementById("email").value.trim();


const message =
document.getElementById("message").value.trim();



const response =
document.getElementById("response");




if(!/^[A-Za-zÁÉÍÓÚáéíóúñÑ ]+$/.test(name)){


response.className="error";

response.innerHTML=
"✕ Ingresa un nombre válido.";

return;


}




if(!/^[0-9]{9}$/.test(phone)){


response.className="error";

response.innerHTML=
"✕ El teléfono debe tener 9 dígitos.";

return;


}




let contact={

name,
phone,
email,
message,
date:new Date().toLocaleString()

};




let messages =
JSON.parse(
localStorage.getItem("contacts")
) || [];



messages.push(contact);



localStorage.setItem(
"contacts",
JSON.stringify(messages)
);





response.className="success";


response.innerHTML=

"✓ Gracias "+name+
", tu mensaje fue enviado correctamente. Nos comunicaremos pronto.";





this.reset();



});



</script>



</body>


</html>
